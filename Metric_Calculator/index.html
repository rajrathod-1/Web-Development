<html>
    <head>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.css">
        <link rel="stylesheet" href="index.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="header">
            <h2 id="header-h2">Metric/Imperial Unit Conversion</h2>
            <input type="text" id="input-field">
            <button id="convert-button">Convert</button>
        </div>  
        <div class="conversion">
            <div class="conversion-child">
                <h2 class="conversion-h2">Length (Meter/Feet)</h2>
                <h3 id="length-h3" class="converted"></h3>
            </div>
            <div class="conversion-child">
                <h2 class="conversion-h2">Volume (Liters/Gallons)</h2>
                <h3 id="volume-h3" class="converted"></h3>
            </div>
            <div class="conversion-child">
                <h2 class="conversion-h2">Mass (Kilograms/Pounds)</h2>
                <h3 id="mass-h3" class="converted"></h3>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
