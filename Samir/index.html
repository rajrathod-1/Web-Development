<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Recommendations</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <h1 class="text-center mt-4">Trading Recommendations</h1>
        <div class="row">
            <div class="col-md-6 offset-md-3 mt-4">
                <div class="custom-dropdown">
                    <button class="custom-button" id="dropdownCondition1">
                        Condition 1
                        <span class="dropdown-arrow">&#9660;</span>
                    </button>
                    <div class="dropdown-content" id="dropdownContent1">
                        <!-- JavaScript will populate this -->
                    </div>
                </div>
            </div>
            <div class="col-md-6 offset-md-3 mt-2">
                <div class="custom-dropdown">
                    <button class="custom-button" id="dropdownCondition2">
                        Condition 2
                        <span class="dropdown-arrow">&#9660;</span>
                    </button>
                    <div class="dropdown-content" id="dropdownContent2">
                        <!-- JavaScript will populate this -->
                    </div>
                </div>
            </div>
            <div class="col-md-6 offset-md-3 mt-2">
                <div class="custom-dropdown">
                    <button class="custom-button" id="dropdownCondition3">
                        Condition 3
                        <span class="dropdown-arrow">&#9660;</span>
                    </button>
                    <div class="dropdown-content" id="dropdownContent3">
                        <!-- JavaScript will populate this -->
                    </div>
                </div>
            </div>
            <div class="col-md-8 offset-md-2 mt-4">
                <div id="result-popup" class="popup">
                    <span class="close-popup" id="closePopup">&times;</span>
                    <div id="result" class="text-center"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
